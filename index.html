<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💉Carteira de Vacinas - Gabriel</title>
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --muted: #64748b;
      --border: #e2e8f0; --taken: #f0fdf4; --taken-border: #22c55e;
      --primary: #3b82f6; --shadow: 0 4px 12px rgba(0,0,0,0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; padding-bottom: 100px; }
    
    /* Auth */
    #auth-container { max-width: 400px; margin: 50px auto; padding: 30px; background: white; border-radius: 16px; box-shadow: var(--shadow); }
    .auth-tabs { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .auth-tab { padding: 10px; cursor: pointer; color: var(--muted); font-weight: 600; }
    .auth-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
    input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
    .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }

    /* Layout */
    #app { max-width: 600px; margin: 0 auto; display: none; }
    header { text-align: center; margin-bottom: 30px; }
    .section-title { font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin: 25px 0 10px; letter-spacing: 1px; border-left: 4px solid var(--primary); padding-left: 10px; }
    
    /* Cards */
    .vax-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); transition: 0.3s; }
    .vax-card.is-taken { background: var(--taken); border-color: var(--taken-border); }
    .vax-name { font-weight: 700; font-size: 1rem; display: block; }
    .vax-meta { font-size: 0.8rem; color: var(--muted); }
    .badge-feito { background: #22c55e; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
    .tag-particular { background: #fef3c7; color: #92400e; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 5px; }

    .actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-vax { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
    .btn-now { background: #22c55e; color: white; }
    .btn-del { background: #fee2e2; color: #dc2626; flex: 0 0 100px; }

    .floating-add { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: none; cursor: pointer; box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3); }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 25px; border-radius: 16px; width: 100%; max-width: 400px; }

    #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #334155; color: white; padding: 10px 20px; border-radius: 50px; display: none; z-index: 1000; }
  </style>
</head>
<body>

  <div id="toast"></div>

  <div id="auth-container">
    <h2 style="text-align:center; margin-bottom:20px;">💉 Carteira Gabriel</h2>
    <div class="auth-tabs">
      <div id="tab-login" class="auth-tab active">Entrar</div>
      <div id="tab-signup" class="auth-tab">Cadastrar</div>
    </div>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Senha">
    <button id="btn-auth" class="btn-main">Entrar</button>
  </div>

  <div id="app">
    <header>
      <h1>Vacinas do Gabriel</h1>
      <p id="user-display" style="font-size: 0.8rem; color: var(--muted); margin-bottom: 5px;"></p>
      <button onclick="signOutApp()" style="background:none; border:none; color:red; cursor:pointer; font-size:0.75rem; text-decoration: underline;">Sair da conta</button>
    </header>

    <div id="vax-list"></div>
    <button class="floating-add" id="btn-open-modal">+</button>
  </div>

  <div class="modal" id="modal-manual">
    <div class="modal-content">
      <h3 style="margin-bottom:15px;">Nova Vacina Tomada</h3>
      <input type="text" id="man-name" placeholder="Nome da Vacina (ex: Dengue)">
      <input type="text" id="man-dose" placeholder="Dose (ex: 1ª Dose)">
      <select id="man-sec">
        <option value="Manual">Extras / Manuais</option>
        <option value="Nascimento">Nascimento</option>
        <option value="Infantil (até 15 meses)">Infantil (até 15 meses)</option>
        <option value="Reforços (4-6 anos)">Reforços (4-6 anos)</option>
        <option value="Adolescência (9-14 anos)">Adolescência (9-14 anos)</option>
        <option value="Jovem Adulto (até 20 anos)">Jovem Adulto (até 20 anos)</option>
      </select>
      <button class="btn-main" id="btn-save-manual">Salvar e Marcar Tomada</button>
      <button onclick="document.getElementById('modal-manual').classList.remove('active')" style="width:100%; background:none; border:none; color:var(--muted); margin-top:10px; cursor:pointer;">Cancelar</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAa2LcYIJCoGJ4AJmdA8VeGY6Ad9MQePAw",
      authDomain: "carteira-vacina-7ffd1.firebaseapp.com",
      projectId: "carteira-vacina-7ffd1",
      storageBucket: "carteira-vacina-7ffd1.firebasestorage.app",
      messagingSenderId: "96202787745",
      appId: "1:96202787745:web:67fdabcfc525b0d1ac99e0"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    let state = { user: null, taken: {}, manual: [] };
    let isLogin = true;

    // BANCO DE DADOS ATÉ 20 ANOS
    const vaccineDB = [
      // Nascimento
      { id:'bcg', name:'BCG', dose:'Única', sec:'Nascimento', part:false },
      { id:'hb', name:'Hepatite B', dose:'Nascimento', sec:'Nascimento', part:false },
      
      // Infantil
      { id:'penta1', name:'Pentavalente', dose:'1ª Dose', sec:'Infantil (até 15 meses)', part:false },
      { id:'vip1', name:'Pólio (VIP)', dose:'1ª Dose', sec:'Infantil (até 15 meses)', part:false },
      { id:'pcv1', name:'Pneumocócica 10V', dose:'1ª Dose', sec:'Infantil (até 15 meses)', part:false },
      { id:'menC1', name:'Meningo C', dose:'1ª Dose', sec:'Infantil (até 15 meses)', part:false },
      { id:'scr1', name:'Tríplice Viral', dose:'1ª Dose', sec:'Infantil (até 15 meses)', part:false },
      { id:'hepa', name:'Hepatite A', dose:'Dose Única', sec:'Infantil (até 15 meses)', part:false },
      
      // Reforços Escolares
      { id:'dtp_ref', name:'DTP (Tríplice Bacteriana)', dose:'1º Reforço', sec:'Reforços (4-6 anos)', part:false },
      { id:'vop_ref', name:'Pólio (VOP)', dose:'Reforço', sec:'Reforços (4-6 anos)', part:false },
      { id:'tetra_ref', name:'Varicela', dose:'2ª Dose', sec:'Reforços (4-6 anos)', part:false },
      
      // Adolescência
      { id:'hpv1', name:'HPV', dose:'1ª Dose', sec:'Adolescência (9-14 anos)', part:false },
      { id:'hpv2', name:'HPV', dose:'2ª Dose', sec:'Adolescência (9-14 anos)', part:false },
      { id:'menACWY', name:'Meningocócica ACWY', dose:'Reforço', sec:'Adolescência (9-14 anos)', part:false },
      
      // Jovem Adulto (15 a 20 anos)
      { id:'dt_adulto', name:'Dupla Adulta (DT)', dose:'Reforço (cada 10 anos)', sec:'Jovem Adulto (até 20 anos)', part:false },
      { id:'hb_adulto', name:'Hepatite B', dose:'Reforço (se necessário)', sec:'Jovem Adulto (até 20 anos)', part:false },
      { id:'febre_am_ad', name:'Febre Amarela', dose:'Dose Única / Reforço', sec:'Jovem Adulto (até 20 anos)', part:false },
      { id:'scr_ad', name:'Tríplice Viral', dose:'Dose Atualização', sec:'Jovem Adulto (até 20 anos)', part:false }
    ];

    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 3000); }

    async function sync() {
      if(state.user) await setDoc(doc(db, "users", state.user.uid), { taken: state.taken, manual: state.manual });
    }

    function render() {
      const list = document.getElementById('vax-list');
      list.innerHTML = '';
      const allVax = [...vaccineDB, ...state.manual];
      
      // Ordem personalizada das seções
      const sectionOrder = ['Nascimento', 'Infantil (até 15 meses)', 'Reforços (4-6 anos)', 'Adolescência (9-14 anos)', 'Jovem Adulto (até 20 anos)', 'Manual'];
      const sectionsInUse = [...new Set(allVax.map(v => v.sec))].sort((a, b) => sectionOrder.indexOf(a) - sectionOrder.indexOf(b));

      sectionsInUse.forEach(s => {
        const div = document.createElement('div');
        div.innerHTML = `<div class="section-title">${s}</div>`;
        allVax.filter(v => v.sec === s).forEach(v => {
          const taken = state.taken[v.id];
          const card = document.createElement('div');
          card.className = `vax-card ${taken ? 'is-taken' : ''}`;
          
          card.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
              <div>
                <span class="vax-name">${v.name} ${v.part ? '<span class="tag-particular">Rede Privada</span>' : ''}</span>
                <span class="vax-meta">${v.dose}</span>
                ${taken ? `<div style="color: #166534; font-size: 0.75rem; font-weight: bold; margin-top: 4px;">✅ Concluído em ${taken.date}</div>` : ''}
              </div>
              ${taken ? `<span class="badge-feito">FEITO</span>` : ''}
            </div>
            <div class="actions">
              ${!taken ? 
                `<button class="btn-vax btn-now" onclick="toggleVax('${v.id}', true)">Marcar Tomada</button>` : 
                `<button class="btn-vax btn-del" onclick="toggleVax('${v.id}', false)">🗑️ Remover</button>`
              }
            </div>
          `;
          div.appendChild(card);
        });
        list.appendChild(div);
      });
    }

    window.toggleVax = async (id, status) => {
      if(status) state.taken[id] = { date: new Date().toLocaleDateString('pt-BR') };
      else { 
        delete state.taken[id];
        state.manual = state.manual.filter(m => m.id !== id);
      }
      await sync(); render();
    };

    document.getElementById('btn-save-manual').onclick = async () => {
      const name = document.getElementById('man-name').value;
      if(!name) return;
      const id = 'man_' + Date.now();
      state.manual.push({ id, name, dose: document.getElementById('man-dose').value || 'Dose Única', sec: document.getElementById('man-sec').value });
      state.taken[id] = { date: new Date().toLocaleDateString('pt-BR') };
      await sync(); render();
      document.getElementById('modal-manual').classList.remove('active');
      document.getElementById('man-name').value = '';
      showToast("Vacina manual adicionada!");
    };

    document.getElementById('tab-login').onclick = () => { isLogin=true; document.getElementById('tab-login').classList.add('active'); document.getElementById('tab-signup').classList.remove('active'); document.getElementById('btn-auth').innerText='Entrar'; };
    document.getElementById('tab-signup').onclick = () => { isLogin=false; document.getElementById('tab-signup').classList.add('active'); document.getElementById('tab-login').classList.remove('active'); document.getElementById('btn-auth').innerText='Cadastrar'; };
    
    document.getElementById('btn-auth').onclick = async () => {
      const e = document.getElementById('email').value, p = document.getElementById('password').value;
      if(!e || !p) return alert("Preencha todos os campos");
      try { isLogin ? await signInWithEmailAndPassword(auth, e, p) : await createUserWithEmailAndPassword(auth, e, p); } catch(err) { alert("Erro: " + err.message); }
    };
    
    window.signOutApp = () => signOut(auth);
    document.getElementById('btn-open-modal').onclick = () => document.getElementById('modal-manual').classList.add('active');

    onAuthStateChanged(auth, async (user) => {
      if(user) {
        state.user = user;
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('user-display').innerText = `Logado como: ${user.email}`;
        const snap = await getDoc(doc(db, "users", user.uid));
        if(snap.exists()) {
          state.taken = snap.data().taken || {};
          state.manual = snap.data().manual || [];
        }
        render();
      } else {
        document.getElementById('auth-container').style.display = 'block';
        document.getElementById('app').style.display = 'none';
      }
    });
  </script>
</body>
</html>
